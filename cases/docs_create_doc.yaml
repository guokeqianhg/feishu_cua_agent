id: docs_create_doc_001
name: Guarded Docs create document
product: docs
instruction: "在飞书云文档中新建一个测试文档，标题为「CUA-Lark 测试文档」，正文为「这是一段安全测试正文，不包含真实业务信息。」"
preconditions:
  - Feishu desktop client is logged in.
  - The current account can create Docs.
  - Real execution requires CUA_LARK_ALLOW_DOC_CREATE=true.
expected_result: "A guarded test document is created and the title/body are visible."
tags:
  - docs
  - guarded
  - e2e
timeout_seconds: 300
metadata:
  plan_template: docs_create_doc_guarded
  safety_guard_required: true
  doc_title: "CUA-Lark 测试文档"
  doc_body: "这是一段安全测试正文，不包含真实业务信息。"
